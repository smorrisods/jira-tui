name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag (must start with v). Leave blank to use the package version.
        required: false
        type: string
      release_draft:
        description: Create or keep this release as a draft
        required: false
        default: false
        type: boolean

concurrency:
  # Group reruns for the same tag together, even when a manual dispatch derives the tag from Cargo.toml.
  group: "release-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && (inputs.release_tag != '' && inputs.release_tag || github.ref_name) || github.ref_name }}"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-24.04
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_id: ${{ steps.release.outputs.release_id }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Cargo.toml must be present when deriving a manual release tag from the package version.
          ref: ${{ github.sha }}

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.release_tag }}"
            # Manual runs can omit the tag and fall back to the checked-in package version.
            if [[ -z "${TAG}" ]]; then
              VERSION="$(./scripts/prepare-release-version.sh --current-version)"
              if [[ -z "${VERSION}" ]]; then
                echo "Failed to derive package version from Cargo.toml" >&2
                exit 1
              fi
              TAG="v${VERSION}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TAG}" >&2
            echo "Expected a tag matching vX.Y.Z" >&2
            exit 1
          fi

          VERSION="${TAG#v}"

          echo "tag_name=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "release_name=jira-tui ${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create or reuse release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          MANUAL_RELEASE_DRAFT: ${{ inputs.release_draft }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RELEASE_DRAFT="${MANUAL_RELEASE_DRAFT:-false}"
          else
            RELEASE_DRAFT="false"
          fi

          RELEASE_MATCH="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"${TAG_NAME}\") | [.id, .draft] | @tsv" \
              | head -n 1 || true
          )"

          # Reuse an existing release so manual reruns can replace assets without creating duplicates.
          if [[ -z "${RELEASE_MATCH}" ]]; then
            RELEASE_ID="$(
              gh api \
                --method POST \
                "repos/${GITHUB_REPOSITORY}/releases" \
                -f tag_name="${TAG_NAME}" \
                -f target_commitish="${GITHUB_SHA}" \
                -f name="${RELEASE_NAME}" \
                -f body='See assets below for Linux and macOS downloads, Linux packages, and checksums (SHA256SUMS). macOS builds are ad-hoc signed only (not notarized) — see the README for first-run Gatekeeper guidance.' \
                -F generate_release_notes=true \
                -F draft="${RELEASE_DRAFT}" \
                -F prerelease=false \
                --jq '.id'
            )"
          else
            RELEASE_ID="$(awk '{print $1}' <<< "${RELEASE_MATCH}")"
            EXISTING_DRAFT="$(awk '{print $2}' <<< "${RELEASE_MATCH}")"

            if [[ "${EXISTING_DRAFT}" == "true" && "${RELEASE_DRAFT}" == "false" ]]; then
              gh api \
                --method PATCH \
                "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
                -F draft=false > /dev/null
            fi
          fi

          echo "release_id=${RELEASE_ID}" >> "${GITHUB_OUTPUT}"

      - name: Write summary
        shell: bash
        run: |
          {
            echo "## Release preparation"
            echo
            echo "- Tag: \`${{ steps.meta.outputs.tag_name }}\`"
            echo "- Version: \`${{ steps.meta.outputs.version }}\`"
            echo "- Release name: \`${{ steps.meta.outputs.release_name }}\`"
            echo "- Release ID: \`${{ steps.release.outputs.release_id }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  build-linux:
    name: Build Linux (${{ matrix.artefact_suffix }})
    runs-on: ${{ matrix.os }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: amd64
            artefact_suffix: linux-amd64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
            artefact_suffix: linux-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Manual releases with an explicit tag must build that tagged ref, not the branch that launched the run.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && needs.prepare-release.outputs.tag_name || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          # Keep target-specific artefacts separate while still sharing registry and git cache state.
          key: release-${{ matrix.target }}
          shared-key: release-linux

      - name: Install RPM tooling
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target "${{ matrix.target }}"

      - name: Prepare release artefacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          TAG="${{ needs.prepare-release.outputs.tag_name }}"
          TARGET="${{ matrix.target }}"
          ARCH="${{ matrix.arch }}"
          SUFFIX="${{ matrix.artefact_suffix }}"
          BINARY_SOURCE="target/${TARGET}/release/jira-tui"
          BINARY_OUTPUT="dist/jira-tui-${TAG}-${SUFFIX}"

          # Ship the raw binary alongside packaged artefacts for users who want a direct download.
          cp "${BINARY_SOURCE}" "${BINARY_OUTPUT}"

          scripts/build-release-archive.sh \
            --version "${TAG}" \
            --arch "${ARCH}" \
            --binary "${BINARY_SOURCE}" \
            --output-prefix "dist/jira-tui-${TAG}-${SUFFIX}"

          scripts/build-linux-packages.sh \
            --version "${TAG}" \
            --arch "${ARCH}" \
            --binary "${BINARY_SOURCE}" \
            --output-prefix "dist/jira-tui-${TAG}-${SUFFIX}"

      - name: Upload workflow artefacts
        uses: actions/upload-artifact@v7
        with:
          name: jira-tui-${{ matrix.artefact_suffix }}
          path: |
            dist/jira-tui-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.artefact_suffix }}*
          if-no-files-found: error

      - name: Write summary
        shell: bash
        run: |
          {
            echo "## Linux build summary"
            echo
            echo "- Runner: \`${{ matrix.os }}\`"
            echo "- Target triple: \`${{ matrix.target }}\`"
            echo "- Artefact suffix: \`${{ matrix.artefact_suffix }}\`"
            echo "- Standalone binary: \`jira-tui-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.artefact_suffix }}\`"
            echo "- Archive: \`jira-tui-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.artefact_suffix }}.tar.gz\`"
            echo "- Debian package: \`jira-tui-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.artefact_suffix }}.deb\`"
            echo "- RPM package: \`jira-tui-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.artefact_suffix }}.rpm\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  build-macos:
    name: Build macOS (${{ matrix.artefact_suffix }})
    runs-on: macos-14
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
            artefact_suffix: macos-arm64
          - target: x86_64-apple-darwin
            arch: amd64
            artefact_suffix: macos-amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Manual releases with an explicit tag must build that tagged ref, not the branch that launched the run.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && needs.prepare-release.outputs.tag_name || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both targets are built on the same macos-14 (Apple Silicon) runner —
          # x86_64-apple-darwin cross-compiles from there, so we don't need a
          # separate Intel runner just for the amd64 artefact.
          targets: ${{ matrix.target }}

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          shared-key: release-macos

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target "${{ matrix.target }}"

      - name: Ad-hoc code-sign the binary
        shell: bash
        run: |
          set -euo pipefail
          # No Apple Developer account / notarization budget yet (see
          # docs/release/distribution-strategy.md) — ad-hoc signing at least
          # gives the binary a consistent local code identity. Gatekeeper will
          # still flag it as unidentified on first run; that's documented in
          # the README and install.sh's output, not hidden.
          codesign --sign - --force --deep "target/${{ matrix.target }}/release/jira-tui"

      - name: Prepare release artefacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          TAG="${{ needs.prepare-release.outputs.tag_name }}"
          TARGET="${{ matrix.target }}"
          ARCH="${{ matrix.arch }}"
          SUFFIX="${{ matrix.artefact_suffix }}"
          BINARY_SOURCE="target/${TARGET}/release/jira-tui"
          BINARY_OUTPUT="dist/jira-tui-${TAG}-${SUFFIX}"

          # Ship the raw binary alongside the archive for users who want a direct download.
          cp "${BINARY_SOURCE}" "${BINARY_OUTPUT}"

          scripts/build-release-archive.sh \
            --version "${TAG}" \
            --arch "${ARCH}" \
            --binary "${BINARY_SOURCE}" \
            --output-prefix "dist/jira-tui-${TAG}-${SUFFIX}"

      - name: Upload workflow artefacts
        uses: actions/upload-artifact@v7
        with:
          name: jira-tui-${{ matrix.artefact_suffix }}
          path: |
            dist/jira-tui-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.artefact_suffix }}*
          if-no-files-found: error

      - name: Write summary
        shell: bash
        run: |
          {
            echo "## macOS build summary"
            echo
            echo "- Runner: \`macos-14\`"
            echo "- Target triple: \`${{ matrix.target }}\`"
            echo "- Artefact suffix: \`${{ matrix.artefact_suffix }}\`"
            echo "- Code signing: ad-hoc (\`codesign --sign -\`) — not notarized"
            echo "- Standalone binary: \`jira-tui-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.artefact_suffix }}\`"
            echo "- Archive: \`jira-tui-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.artefact_suffix }}.tar.gz\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish-release:
    name: Publish GitHub Release assets
    needs:
      - prepare-release
      - build-linux
      - build-macos
    runs-on: ubuntu-24.04
    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v6
        with:
          pattern: jira-tui-*
          path: release-assets
          merge-multiple: true

      - name: Generate one SHA256SUMS covering every artefact
        id: checksums
        shell: bash
        run: |
          set -euo pipefail

          release_dir="release-assets"

          if [[ ! -d "${release_dir}" ]]; then
            echo "Release asset directory not found: ${release_dir}" >&2
            exit 1
          fi

          mapfile -t release_files < <(find "${release_dir}" -maxdepth 1 -type f | sort)

          if [[ "${#release_files[@]}" -eq 0 ]]; then
            echo "No release assets were downloaded" >&2
            exit 1
          fi

          (
            cd "${release_dir}"
            # `sha256sum -- *` (not `./*`) so filenames in SHA256SUMS have no
            # leading `./`, and `sha256sum -c SHA256SUMS` verifies cleanly.
            sha256sum -- * > SHA256SUMS
          )

          echo "asset_count=$(find "${release_dir}" -maxdepth 1 -type f | wc -l | tr -d ' ')" >> "${GITHUB_OUTPUT}"

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          set -euo pipefail
          # --clobber keeps reruns idempotent when a draft release already has assets attached.
          gh release upload "${TAG_NAME}" release-assets/* --clobber

      - name: Write summary
        if: always()
        shell: bash
        run: |
          release_dir="release-assets"
          asset_count=0
          if [[ -d "${release_dir}" ]]; then
            asset_count="$(find "${release_dir}" -maxdepth 1 -type f | wc -l | tr -d ' ')"
          fi

          {
            echo "## Release publish summary"
            echo
            echo "- Release tag: \`${{ needs.prepare-release.outputs.tag_name }}\`"
            echo "- Attached asset count: ${asset_count}"
            echo "- Checksums: one \`SHA256SUMS\` file covering every attached artefact"
            echo
            echo "### Uploaded assets"
            if [[ "${asset_count}" -gt 0 ]]; then
              find "${release_dir}" -maxdepth 1 -type f -printf '%f\n' | sort | sed 's#^#- `#; s#$#`#'
            else
              echo "- _No assets were downloaded_"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
