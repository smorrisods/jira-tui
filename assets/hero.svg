<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">jira-tui</title>
  <desc id="hero-desc">A keyboard-driven Jira terminal UI in Rust. A dark-themed banner with an animated kanban board and Jax the otter.</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050608"/>
      <stop offset="100%" stop-color="#081226"/>
    </linearGradient>

    <!-- Brand gradient: Jira blue to maple red -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2684ff"/>
      <stop offset="55%" stop-color="#4fd1ff"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>

    <!-- Card travel beam -->
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ec66a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2ec66a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2ec66a" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <g opacity="0.08">
    <circle cx="180" cy="280" r="180" fill="#ff6b6b"/>
    <circle cx="1020" cy="50" r="150" fill="#2684ff"/>
    <circle cx="620" cy="150" r="200" fill="#4fd1ff"/>
  </g>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#4fd1ff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
  </g>

  <!-- Kanban board -->
  <g transform="translate(680, 108)" font-family="monospace">
    <!-- Column frames -->
    <g opacity="0.9">
      <rect x="0" y="0" width="150" height="150" rx="10" fill="#0f1520" stroke="#2e3540" stroke-width="1"/>
      <rect x="170" y="0" width="150" height="150" rx="10" fill="#0f1520" stroke="#2e3540" stroke-width="1"/>
      <rect x="340" y="0" width="150" height="150" rx="10" fill="#0f1520" stroke="#2e3540" stroke-width="1"/>
    </g>
    <text x="12" y="20" font-size="11" fill="#7c8796" letter-spacing="0.05em">TO DO</text>
    <text x="182" y="20" font-size="11" fill="#7c8796" letter-spacing="0.05em">IN PROGRESS</text>
    <text x="352" y="20" font-size="11" fill="#7c8796" letter-spacing="0.05em">DONE</text>

    <!-- Static filler cards -->
    <rect x="12" y="34" width="126" height="22" rx="5" fill="#161d2b" stroke="#2e3540"/>
    <rect x="12" y="62" width="126" height="22" rx="5" fill="#161d2b" stroke="#2e3540"/>
    <rect x="182" y="34" width="126" height="22" rx="5" fill="#161d2b" stroke="#2e3540"/>
    <rect x="352" y="62" width="126" height="22" rx="5" fill="#161d2b" stroke="#2e3540"/>

    <!-- Connecting travel beams -->
    <path id="beam-1" d="M12 100 C60 100, 100 100, 182 100" stroke="url(#beam)" stroke-width="2" fill="none" opacity="0.6"/>
    <path id="beam-2" d="M182 100 C240 100, 280 100, 352 100" stroke="url(#beam)" stroke-width="2" fill="none" opacity="0.6"/>

    <!-- The travelling issue card: DS-123 -->
    <g filter="url(#glow)">
      <rect x="0" y="0" width="112" height="24" rx="6" fill="#12308a" stroke="#2684ff" stroke-width="1">
        <animateMotion dur="6s" repeatCount="indefinite"
          path="M12 88 L12 88 L12 88 L182 88 L182 88 L182 88 L352 88 L352 88 L352 88"
          keyTimes="0;0.28;0.33;0.38;0.61;0.66;0.71;0.94;1"
          keyPoints="0;0;0.005;0.01;0.485;0.495;0.505;0.995;1"
          calcMode="linear"/>
      </rect>
      <text x="10" y="16" font-size="12" fill="#8fc2ff">
        <animateMotion dur="6s" repeatCount="indefinite"
          path="M12 88 L12 88 L12 88 L182 88 L182 88 L182 88 L352 88 L352 88 L352 88"
          keyTimes="0;0.28;0.33;0.38;0.61;0.66;0.71;0.94;1"
          keyPoints="0;0;0.005;0.01;0.485;0.495;0.505;0.995;1"
          calcMode="linear"/>
        DS-123
      </text>
    </g>
  </g>

  <!-- Jax the otter, bobbing beside the board -->
  <g transform="translate(596, 232)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="2.4s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="8" rx="20" ry="16" fill="#8a5a3a"/>
      <circle cx="0" cy="-12" r="13" fill="#a06b46"/>
      <circle cx="-6" cy="-22" r="4" fill="#8a5a3a"/>
      <circle cx="6" cy="-22" r="4" fill="#8a5a3a"/>
      <ellipse cx="0" cy="-8" rx="6" ry="5" fill="#e9d3b8"/>
      <circle cx="-4" cy="-14" r="1.6" fill="#1c1c1c"/>
      <circle cx="4" cy="-14" r="1.6" fill="#1c1c1c"/>
      <circle cx="0" cy="-8" r="1.4" fill="#1c1c1c"/>
    </g>
  </g>

  <!-- Title -->
  <text x="80" y="76" font-size="46" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-weight="700" letter-spacing="-0.02em" fill="url(#brand)" filter="url(#text-glow)">jira-tui 🍁</text>

  <!-- Tagline -->
  <text x="82" y="104" fill="#b4bfce" font-size="16" font-family="'Inter', system-ui, sans-serif">A keyboard-driven Jira terminal UI, written in Rust</text>

  <!-- Prompt badge -->
  <g transform="translate(80, 132)">
    <rect width="220" height="38" rx="10" fill="#0f1520" stroke="#2e3540" stroke-width="1"/>
    <text x="16" y="25" font-size="16" font-family="monospace">
      <tspan fill="#7c8796">&gt; </tspan><tspan fill="#2684ff" font-weight="700">jira-tui</tspan><tspan fill="#2ec66a"> _</tspan>
    </text>
  </g>

  <!-- Bottom info line -->
  <text x="80" y="290" fill="#7c8796" font-size="13" font-family="monospace">
    <tspan fill="#9aa4b2">ratatui</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa4b2">ADF-native</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa4b2">offline-first</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa4b2">MCP-ready</tspan>
    <tspan fill="#2e3540">  &#x2022;  </tspan>
    <tspan fill="#7c8796">Liminal HQ</tspan>
  </text>
</svg>
